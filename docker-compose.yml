services:
  postgres:
    image: postgres:16-alpine
    container_name: avtobaks-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: avtobaks
      POSTGRES_USER: avtobaks
      POSTGRES_PASSWORD: avtobaks
    ports:
      - "5433:5432"
    volumes:
      - avtobaks-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avtobaks -d avtobaks"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  avtobaks-postgres-data:
